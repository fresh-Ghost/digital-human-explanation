<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>灵境·AI 数字讲解 MVP</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 0; }
    .container { display: flex; height: 100vh; }
    .left, .right { padding: 16px; box-sizing: border-box; }
    .left { width: 35%; border-right: 1px solid #eee; }
    .right { width: 65%; }
    textarea { width: 100%; height: 120px; }
    button { margin-top: 8px; padding: 6px 12px; }
    img { max-width: 100%; border-radius: 4px; }
    .script-meta { margin-bottom: 8px; font-size: 14px; color: #555; }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <h2>策展配置（简化版）</h2>
      <label>受众：</label>
      <input id="audience" type="text" value="领导参观" style="width:100%;"/><br/><br/>
      <label>预计时长（分钟）：</label>
      <input id="duration" type="number" value="5" style="width:100%;"/><br/><br/>
      <label>备注/补充需求：</label><br/>
      <textarea id="message">希望突出商业价值，少讲技术细节。</textarea><br/>
      <button onclick="sendCuratorChat()">发送策展需求</button>
      <pre id="curatorReply"></pre>

      <hr/>

      <h3>脚本生成</h3>
      <button onclick="generateScript()">生成讲解脚本</button>
      <pre id="scriptMeta"></pre>
    </div>

    <div class="right">
      <h2>讲解播放器（MVP）</h2>
      <div id="slideInfo" class="script-meta">尚未加载脚本</div>
      <div id="slideMedia"></div>
      <div id="slideText" style="margin-top:12px;font-size:16px;"></div>
      <div style="margin-top:16px;">
        <button onclick="prevSlide()">上一页</button>
        <button onclick="nextSlide()">下一页</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:8000";
    let currentScript = null;
    let currentIndex = 0;

    async function sendCuratorChat() {
      const audience = document.getElementById("audience").value;
      const duration = parseInt(document.getElementById("duration").value || "5", 10);
      const message = document.getElementById("message").value;

      const body = {
        message,
        audience,
        duration_minutes: duration,
        focus: "business" // MVP 先写死
      };

      const res = await fetch(API_BASE + "/api/v1/curator/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      document.getElementById("curatorReply").textContent = data.reply;
    }

    async function generateScript() {
      const audience = encodeURIComponent(document.getElementById("audience").value || "通用观众");
      const duration = encodeURIComponent(document.getElementById("duration").value || "5");

      const res = await fetch(API_BASE + `/api/v1/script/generate?audience=${audience}&duration_minutes=${duration}`);
      const script = await res.json();
      currentScript = script;
      currentIndex = 0;
      document.getElementById("scriptMeta").textContent =
        `脚本ID: ${script.id}\n标题: ${script.meta.title}\n受众: ${script.meta.target_audience}\n预计时长: ${script.meta.estimated_duration} 分钟`;
      renderCurrentSlide();
    }

    function renderCurrentSlide() {
      const infoEl = document.getElementById("slideInfo");
      const mediaEl = document.getElementById("slideMedia");
      const textEl = document.getElementById("slideText");

      if (!currentScript || !currentScript.timeline || currentScript.timeline.length === 0) {
        infoEl.textContent = "尚未加载脚本";
        mediaEl.innerHTML = "";
        textEl.textContent = "";
        return;
      }

      const node = currentScript.timeline[currentIndex];
      infoEl.textContent = `第 ${currentIndex + 1}/${currentScript.timeline.length} 页 · 类型: ${node.type} · 预计时长: ${Math.round(node.duration_ms / 1000)} 秒`;
      if (node.type === "image") {
        mediaEl.innerHTML = `<img src="${node.url}" alt="slide"/>`;
      } else {
        mediaEl.innerHTML = `<div>暂未实现视频播放（MVP 仅展示占位）</div>`;
      }
      textEl.textContent = node.voice_text;
    }

    function prevSlide() {
      if (!currentScript) return;
      currentIndex = Math.max(0, currentIndex - 1);
      renderCurrentSlide();
    }

    function nextSlide() {
      if (!currentScript) return;
      currentIndex = Math.min(currentScript.timeline.length - 1, currentIndex + 1);
      renderCurrentSlide();
    }
  </script>
</body>
</html>
